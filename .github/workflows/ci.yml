name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      AUDRI_SECRET: audri-ci-only-secret-with-sufficient-length
      CRON_SECRET: audri-ci-cron-secret
      NEXT_PUBLIC_APP_URL: https://audriai.vercel.app
      AUDRI_REQUIRE_EMAIL_VERIFICATION: "false"
      DISABLE_SCRAPE_SCHEDULER: "true"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm test
      - run: npm run build
